<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bạn có yêu mèo không? 🐱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background sparkles/floating shapes -->
    <div class="decorations">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
        <div class="bubble bubble-4"></div>
    </div>

    <div class="app-container">
        <div class="card" id="main-card">
            <div class="image-wrapper">
                <img id="cat-hero-img" src="assets/cat_love_hero.png" alt="Mèo dễ thương" class="hero-img">
            </div>
            <h1 class="question" id="main-question">Bạn có yêu mèo không? 🐱</h1>
            <p class="subtitle" id="main-subtitle">Hãy trả lời thật lòng nhé! 💕</p>
            
            <div class="buttons-container">
                <button class="btn btn-yes" id="btn-yes">Có chứ! 😍</button>
                <button class="btn btn-no" id="btn-no">Không... 😢</button>
            </div>
        </div>
    </div>

    <!-- Container for dynamic celebrations (confetti, hearts, dancing cats) -->
    <div id="celebration-container" class="celebration-container"></div>

    <script src="script.js"></script>
</body>
</html>
